# Example custom definitions file for pgEdge PostgreSQL MCP Server
# This file demonstrates how to define custom prompts and resources

prompts:
    # Example 1: Simple prompt with argument interpolation
    # Arguments support a 'type' field: "string" (default) or "boolean"
    - name: analyze-table
      description: Analyzes a specific database table to understand its structure and content
      arguments:
          - name: table_name
            description: The name of the table to analyze
            required: true
            type: string
      messages:
          - role: user
            content:
                type: text
                text: |
                  Please analyze the {{table_name}} table in detail:

                  1. First, use get_schema_info(table_name="{{table_name}}") to understand its structure
                  2. Check for indexes, constraints, and relationships
                  3. Query a sample of data: query_database(query="SELECT * FROM {{table_name}} LIMIT 5")
                  4. Identify the table's purpose and any patterns in the data
                  5. Suggest potential optimizations or queries

                  Provide a comprehensive analysis report.

    # Example 2: Prompt with multiple arguments including a boolean type
    - name: compare-schemas
      description: Compares two database schemas to identify differences
      arguments:
          - name: schema1
            description: First schema name
            required: true
            type: string
          - name: schema2
            description: Second schema name
            required: true
            type: string
          - name: include_indexes
            description: If true, include index comparison in the analysis
            required: false
            type: boolean
      messages:
          - role: user
            content:
                type: text
                text: |
                    Compare the structures of schema "{{schema1}}" and "{{schema2}}":

                    1. Get schema info for {{schema1}}: get_schema_info(schema_name="{{schema1}}")
                    2. Get schema info for {{schema2}}: get_schema_info(schema_name="{{schema2}}")
                    3. Identify tables that exist in one schema but not the other
                    4. Compare table structures for tables that exist in both
                    5. Note any differences in columns, types, or constraints

                    Provide a detailed comparison report.

    # Example 3: Simple workflow prompt without arguments
    - name: security-audit
      description: Performs a security audit of the database
      arguments: []
      messages:
          - role: user
            content:
                type: text
                text: |
                    Perform a security audit of this PostgreSQL database:

                    1. Check user privileges and roles
                    2. Identify tables without proper access controls
                    3. Look for potential SQL injection vulnerabilities in stored procedures
                    4. Check for unencrypted sensitive data
                    5. Review connection settings and authentication methods

                    Provide a security assessment with recommendations.

resources:
    # Example 1: SQL resource - Active users
    - uri: custom://active-users
      name: Active Users
      description: Returns a list of all active users in the system
      mimeType: application/json
      type: sql
      sql: |
          SELECT
              usename as username,
              usesysid as user_id,
              usecreatedb as can_create_db,
              usesuper as is_superuser,
              valuntil as valid_until
          FROM pg_user
          WHERE valuntil IS NULL OR valuntil > NOW()
          ORDER BY usename

    # Example 2: SQL resource - Large tables
    - uri: custom://large-tables
      name: Large Tables
      description: Returns the 10 largest tables in the database by size
      mimeType: application/json
      type: sql
      sql: |
          SELECT
              schemaname,
              tablename,
              pg_size_pretty(pg_total_relation_size(schemaname||'.'||tablename)) as size,
              pg_total_relation_size(schemaname||'.'||tablename) as size_bytes
          FROM pg_tables
          WHERE schemaname NOT IN ('pg_catalog', 'information_schema')
          ORDER BY size_bytes DESC
          LIMIT 10

    # Example 3: SQL resource - Recent database activity
    - uri: custom://recent-activity
      name: Recent Database Activity
      description: Shows recent database activity and connection statistics
      type: sql
      sql: |
          SELECT
              datname as database,
              numbackends as active_connections,
              xact_commit as transactions_committed,
              xact_rollback as transactions_rolled_back,
              blks_read as blocks_read,
              blks_hit as blocks_hit_cache,
              tup_returned as tuples_returned,
              tup_fetched as tuples_fetched,
              tup_inserted as tuples_inserted,
              tup_updated as tuples_updated,
              tup_deleted as tuples_deleted
          FROM pg_stat_database
          WHERE datname = current_database()

    # Example 4: Static resource - Single value
    - uri: custom://environment
      name: Environment
      description: Returns the current environment (development, staging, production)
      mimeType: application/json
      type: static
      data: "production"

    # Example 5: Static resource - Single row (array)
    - uri: custom://support-contact
      name: Support Contact
      description: Contact information for database support
      mimeType: application/json
      type: static
      data:
          - "Database Support Team"
          - "support@example.com"
          - "+1-555-0123"
          - "https://support.example.com"

    # Example 6: Static resource - Multiple rows (2D array)
    - uri: custom://maintenance-schedule
      name: Maintenance Schedule
      description: Scheduled database maintenance windows
      mimeType: application/json
      type: static
      data:
          - ["2025-02-01", "02:00", "04:00", "Security patches"]
          - ["2025-02-15", "03:00", "05:00", "Version upgrade"]
          - ["2025-03-01", "02:00", "04:00", "Backup verification"]

    # Example 7: Static resource - Configuration object
    - uri: custom://db-config
      name: Database Configuration
      description: Important database configuration parameters
      mimeType: application/json
      type: static
      data:
          max_connections: 100
          shared_buffers: "256MB"
          effective_cache_size: "1GB"
          maintenance_work_mem: "64MB"
          checkpoint_completion_target: 0.9
          wal_buffers: "16MB"
          default_statistics_target: 100
          random_page_cost: 4.0
          work_mem: "4MB"

# Custom tools allow you to expose database operations as callable MCP tools.
# Three types are supported:
#   - sql: Execute parameterized SQL queries
#   - pl-do: Execute PL/* DO blocks (anonymous functions) - uses set_config for output
#   - pl-func: Create temporary PL/* functions with proper RETURN types
#
# For pl-do and pl-func, the language must be in the database's allowed_pl_languages list.
tools:
    # Example 1: SQL tool - Database statistics query
    - name: get_database_stats
      description: Get statistics for a specific database
      type: sql
      input_schema:
          type: object
          properties:
              database_name:
                  type: string
                  description: The database name (defaults to current database)
          required: []
      sql: |
          SELECT
              datname as database_name,
              numbackends as active_connections,
              xact_commit as committed_transactions,
              xact_rollback as rolled_back_transactions,
              blks_read as disk_blocks_read,
              blks_hit as cache_hits,
              CASE WHEN blks_read + blks_hit > 0
                   THEN round(100.0 * blks_hit / (blks_read + blks_hit), 2)
                   ELSE 0 END as cache_hit_ratio,
              tup_returned as rows_returned,
              tup_fetched as rows_fetched,
              tup_inserted as rows_inserted,
              tup_updated as rows_updated,
              tup_deleted as rows_deleted,
              pg_size_pretty(pg_database_size(datname)) as database_size
          FROM pg_stat_database
          WHERE datname = coalesce($1, current_database())

    # Example 2: SQL tool - Table activity analysis with filters
    - name: get_table_activity
      description: Get table activity statistics with optional schema and size filters
      type: sql
      input_schema:
          type: object
          properties:
              schema_name:
                  type: string
                  description: Schema name to filter (defaults to public)
              min_rows:
                  type: integer
                  description: Minimum estimated row count (optional)
              include_toast:
                  type: boolean
                  description: Include TOAST table sizes in output
          required: []
      sql: |
          SELECT
              schemaname as schema_name,
              relname as table_name,
              n_live_tup as estimated_rows,
              n_dead_tup as dead_rows,
              n_tup_ins as rows_inserted,
              n_tup_upd as rows_updated,
              n_tup_del as rows_deleted,
              last_vacuum,
              last_autovacuum,
              last_analyze,
              pg_size_pretty(pg_relation_size(schemaname || '.' || relname)) as table_size,
              CASE WHEN $3::boolean = true
                   THEN pg_size_pretty(pg_total_relation_size(schemaname || '.' || relname))
                   ELSE null END as total_size_with_indexes
          FROM pg_stat_user_tables
          WHERE schemaname = coalesce($1, 'public')
            AND ($2::bigint IS NULL OR n_live_tup >= $2::bigint)
          ORDER BY n_live_tup DESC
          LIMIT 50

    # Example 3: PL/pgSQL DO block - For read-only connections without CREATE permission
    # Use set_config to return results (doesn't rollback, doesn't log to server)
    # Pre-defined variables: args (jsonb), result (jsonb)
    - name: analyze_table_bloat
      description: Analyze table bloat and dead tuples to suggest VACUUM candidates
      type: pl-do
      language: plpgsql
      input_schema:
          type: object
          properties:
              schema_name:
                  type: string
                  description: Schema to analyze (defaults to all user schemas)
              min_dead_tuples:
                  type: integer
                  description: Minimum dead tuples to report (default 100)
          required: []
      code: |
          DECLARE
              rec RECORD;
              min_dead bigint;
              schema_filter text;
          BEGIN
              result := '[]'::jsonb;
              min_dead := coalesce((args->>'min_dead_tuples')::bigint, 100);
              schema_filter := args->>'schema_name';

              FOR rec IN
                  SELECT
                      s.schemaname,
                      s.relname,
                      s.n_dead_tup,
                      s.n_live_tup,
                      CASE WHEN s.n_live_tup + s.n_dead_tup > 0
                           THEN round(100.0 * s.n_dead_tup /
                                (s.n_live_tup + s.n_dead_tup), 2)
                           ELSE 0 END as dead_pct,
                      pg_size_pretty(pg_relation_size(
                          quote_ident(s.schemaname) || '.' || quote_ident(s.relname)
                      )) as table_size,
                      s.last_vacuum,
                      s.last_autovacuum,
                      CASE
                          WHEN s.n_dead_tup > 10000 AND
                               s.n_dead_tup > s.n_live_tup * 0.2
                          THEN 'VACUUM recommended'
                          WHEN s.n_dead_tup > 1000
                          THEN 'Monitor'
                          ELSE 'OK'
                      END as recommendation
                  FROM pg_stat_user_tables s
                  WHERE (schema_filter IS NULL OR s.schemaname = schema_filter)
                    AND s.n_dead_tup >= min_dead
                  ORDER BY s.n_dead_tup DESC
                  LIMIT 20
              LOOP
                  result := result || jsonb_build_object(
                      'schema', rec.schemaname,
                      'table', rec.relname,
                      'dead_tuples', rec.n_dead_tup,
                      'live_tuples', rec.n_live_tup,
                      'dead_tuple_pct', rec.dead_pct,
                      'table_size', rec.table_size,
                      'last_vacuum', rec.last_vacuum,
                      'last_autovacuum', rec.last_autovacuum,
                      'recommendation', rec.recommendation
                  );
              END LOOP;

              IF result = '[]'::jsonb THEN
                  result := jsonb_build_object(
                      'message', 'No tables found with >= ' || min_dead || ' dead tuples',
                      'suggestion', 'Tables are well-maintained or try lowering min_dead_tuples parameter'
                  );
              END IF;

              PERFORM set_config('mcp.tool_result', result::text, true);
          END;

    # Example 4: PL/Python DO block - Full Python with library access
    # Requires: plpython3u language installed AND in allowed_pl_languages
    # Use mcp_return(result) to return results (provided automatically)
    - name: calculate_column_statistics
      description: Calculate statistics for a numeric column (defaults to pg_class.reltuples)
      type: pl-do
      language: plpython3u
      timeout: "60s"
      input_schema:
          type: object
          properties:
              table_name:
                  type: string
                  description: Table to analyze (default pg_class)
              column_name:
                  type: string
                  description: Numeric column to analyze (default reltuples)
          required: []
      code: |
          # Note: 'args' dict and 'mcp_return(result)' function are pre-defined
          import re

          # Get parameters with defaults that work on any PostgreSQL database
          table = args.get('table_name', 'pg_class')
          column = args.get('column_name', 'reltuples')

          # Validate identifiers (alphanumeric, underscore, dot for schema.table)
          if not re.match(r'^[a-zA-Z_][a-zA-Z0-9_]*(\.[a-zA-Z_][a-zA-Z0-9_]*)?$', table):
              mcp_return({"error": "Invalid table name format"})
          if not re.match(r'^[a-zA-Z_][a-zA-Z0-9_]*$', column):
              mcp_return({"error": "Invalid column name format"})

          # Use plpy.quote_ident for safe identifier quoting
          parts = table.split('.')
          if len(parts) == 2:
              safe_table = plpy.quote_ident(parts[0]) + '.' + plpy.quote_ident(parts[1])
          else:
              safe_table = plpy.quote_ident(table)
          safe_column = plpy.quote_ident(column)

          query = f"SELECT {safe_column} as val FROM {safe_table} WHERE {safe_column} IS NOT NULL LIMIT 10000"
          rows = plpy.execute(query)

          if len(rows) == 0:
              mcp_return({"error": "No data found", "table": table, "column": column})
          else:
              values = [float(r['val']) for r in rows if r['val'] is not None]
              if len(values) == 0:
                  mcp_return({"error": "No numeric values found"})
              n = len(values)
              mean = sum(values) / n
              variance = sum((x - mean) ** 2 for x in values) / n
              std_dev = variance ** 0.5
              sorted_vals = sorted(values)
              median = sorted_vals[n // 2] if n % 2 else (sorted_vals[n // 2 - 1] + sorted_vals[n // 2]) / 2

              mcp_return({
                  "table": table,
                  "column": column,
                  "count": n,
                  "mean": round(mean, 4),
                  "median": round(median, 4),
                  "std_dev": round(std_dev, 4),
                  "min": min(values),
                  "max": max(values)
              })

    # Example 5: PL/pgSQL function - Requires CREATE permission, but cleaner return handling
    - name: get_table_row_counts
      description: Get actual row counts for tables in a schema (runs COUNT on each table)
      type: pl-func
      language: plpgsql
      returns: "TABLE(schema_name text, table_name text, row_count bigint)"
      input_schema:
          type: object
          properties:
              schema_pattern:
                  type: string
                  description: Schema name pattern (supports LIKE wildcards, default 'public')
          required: []
      code: |
          DECLARE
              tbl RECORD;
              cnt bigint;
              pattern text;
          BEGIN
              pattern := coalesce(args->>'schema_pattern', 'public');

              FOR tbl IN
                  SELECT t.schemaname, t.tablename
                  FROM pg_tables t
                  WHERE t.schemaname LIKE pattern
                    AND t.schemaname NOT IN ('pg_catalog', 'information_schema')
                  ORDER BY t.schemaname, t.tablename
              LOOP
                  -- %I properly quotes identifiers to prevent SQL injection
                  BEGIN
                      EXECUTE format('SELECT count(*) FROM %I.%I',
                                     tbl.schemaname, tbl.tablename) INTO cnt;
                  EXCEPTION WHEN OTHERS THEN
                      cnt := -1;  -- Indicate error (e.g., permission denied)
                  END;
                  schema_name := tbl.schemaname;
                  table_name := tbl.tablename;
                  row_count := cnt;
                  RETURN NEXT;
              END LOOP;
          END;

    # Example 6: PL/Python function - Return JSON result
    # Note: Requires pg_stat_statements extension to be installed
    - name: analyze_query_patterns
      description: Analyze query patterns from pg_stat_statements (requires extension)
      type: pl-func
      language: plpython3u
      returns: jsonb
      timeout: "30s"
      input_schema:
          type: object
          properties:
              min_calls:
                  type: integer
                  description: Minimum number of calls to include (default 10)
              top_n:
                  type: integer
                  description: Number of top queries to return (default 10)
          required: []
      code: |
          import json

          min_calls = int(args.get('min_calls', 10))
          top_n = int(args.get('top_n', 10))

          # Validate parameters
          if min_calls < 1:
              min_calls = 1
          if top_n < 1 or top_n > 100:
              top_n = 10

          # Check if pg_stat_statements is available
          check = plpy.execute("SELECT 1 FROM pg_extension WHERE extname = 'pg_stat_statements'")
          if len(check) == 0:
              return json.dumps({
                  "error": "pg_stat_statements extension not installed",
                  "suggestion": "Run: CREATE EXTENSION pg_stat_statements; (requires superuser)"
              })

          # Use prepared statement for safety (even though params are validated ints)
          plan = plpy.prepare("""
              SELECT
                  query,
                  calls,
                  round(total_exec_time::numeric, 2) as total_time_ms,
                  round(mean_exec_time::numeric, 2) as avg_time_ms,
                  rows
              FROM pg_stat_statements
              WHERE calls >= $1
              ORDER BY total_exec_time DESC
              LIMIT $2
          """, ["integer", "integer"])

          rows = plpy.execute(plan, [min_calls, top_n])
          results = []
          for r in rows:
              results.append({
                  "query": r['query'][:200] + ('...' if len(r['query']) > 200 else ''),
                  "calls": r['calls'],
                  "total_time_ms": float(r['total_time_ms']),
                  "avg_time_ms": float(r['avg_time_ms']),
                  "rows": r['rows']
              })

          return json.dumps({
              "top_queries": results,
              "count": len(results),
              "filter": {"min_calls": min_calls, "top_n": top_n}
          })
